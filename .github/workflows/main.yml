name: Unity Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  UNITY_VERSION: "2023.3.16f1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Activate Unity License
        uses: game-ci/unity-license-activation@v2
        with:
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}
          serial: ${{ secrets.UNITY_SERIAL }}
        if: env.UNITY_EMAIL != ''

      - name: Create manual Activation File
        if: env.UNITY_EMAIL == ''
        run: |
          echo "No Unity license configured - using manual workflow"
          echo "To fix license errors: Add UNITY_EMAIL, UNITY_PASSWORD, UNITY_SERIAL secrets to repository"

      - name: Setup Unity
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
        continue-on-error: true

      - name: Check build output
        run: |
          if [ -d "Build/Android" ]; then
            echo "Build directory exists"
            ls -la Build/Android/
          else
            echo "Build directory not found"
            echo "This may be a license issue - verify UNITY_SERIAL is valid"
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: Build/Android/*.apk

  check-license:
    runs-on: ubuntu-latest
    outputs:
      has-license: ${{ steps.check.outputs.has-license }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.UNITY_SERIAL }}" ]; then
            echo "has-license=true" >> $GITHUB_OUTPUT
          else
            echo "has-license=false" >> $GITHUB_OUTPUT
          fi