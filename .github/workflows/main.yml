name: Unity Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  UNITY_VERSION: "2023.3.16f1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: UnityProject

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Request Activation File
        uses: game-ci/unity-request-activation-file@v2
        if: always()

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: activation-file
          path: ${{ steps.request-activation.outputs.filePath }}

      - name: Activate Unity License
        uses: game-ci/unity-activate@v2
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - name: Setup Unity
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          projectPath: UnityProject/
        continue-on-error: true

      - name: Check build output
        run: |
          if [ -d "UnityProject/Build/Android" ]; then
            echo "Build directory exists"
            ls -la UnityProject/Build/Android/
          else
            echo "Build directory not found"
            echo "This may be a license issue - verify UNITY_SERIAL is valid"
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: UnityProject/Build/Android/*.apk

  check-license:
    runs-on: ubuntu-latest
    outputs:
      has-license: ${{ steps.check.outputs.has-license }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.UNITY_SERIAL }}" ]; then
            echo "has-license=true" >> $GITHUB_OUTPUT
          else
            echo "has-license=false" >> $GITHUB_OUTPUT
          fi